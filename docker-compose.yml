services:
  ollama:
    image: ollama/ollama:latest
    volumes:
      - ollama:/root/.ollama
    ports:
      - "11434:11434"
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build: .
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      RAG_OLLAMA_BASE_URL: http://ollama:11434
      RAG_OLLAMA_MODEL: llama3.1:8b
    volumes:
      - index:/app/data/index
    ports:
      - "8000:8000"

volumes:
  ollama:
  index:
